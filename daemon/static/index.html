<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>uwu workspace dashboard</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #141717;
      --panel-soft: #101212;
      --accent: #00ced1;
      --accent-soft: rgba(0, 206, 209, 0.14);
      --text: #f2f5f5;
      --muted: #9da8a8;
      --danger: #ff6b6b;
      --ok: #42d68b;
      --warn: #f5d97b;
      --border: #2a3030;
      --shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Avenir Next", "SF Pro Text", "Segoe UI", sans-serif;
      background:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        radial-gradient(circle at top right, #103638 0%, var(--bg) 40%);
      background-size: 26px 26px, 26px 26px, auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.05;
      background-image: radial-gradient(circle, #fff 0.8px, transparent 0.8px);
      background-size: 3px 3px;
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 1rem;
      animation: fadeIn 340ms ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: rgba(20, 23, 23, 0.94);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.9rem 1rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: lowercase;
      font-size: 1rem;
    }

    .brand span {
      color: var(--accent);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(12, minmax(0, 1fr));
    }

    .card {
      background: linear-gradient(165deg, rgba(24, 28, 28, 0.95), rgba(17, 19, 19, 0.95));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem;
      box-shadow: var(--shadow);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      animation: fadeIn 420ms ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(0, 206, 209, 0.42);
      box-shadow: 0 20px 42px rgba(0, 0, 0, 0.38);
    }

    .card h2 {
      margin: 0 0 0.9rem;
      font-size: 0.96rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding-left: 0.6rem;
      border-left: 3px solid var(--accent);
      color: #d6fbfb;
    }

    .vm {
      grid-column: span 12;
    }

    .workspaces {
      grid-column: span 5;
    }

    .projects {
      grid-column: span 7;
    }

    .password {
      grid-column: span 12;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 0.7rem;
    }

    .metric {
      background: linear-gradient(145deg, #121717, #111313);
      border: 1px solid rgba(60, 79, 80, 0.8);
      border-radius: 12px;
      padding: 0.9rem;
      min-height: 84px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .label {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 0.2rem;
      overflow-wrap: anywhere;
    }

    .value {
      font-size: 1.04rem;
      font-weight: 600;
    }

    .list {
      display: grid;
      gap: 0.65rem;
    }

    .item {
      border: 1px solid var(--border);
      background: linear-gradient(160deg, #131616, #101111);
      border-radius: 12px;
      padding: 0.78rem 0.85rem;
      transition: transform 140ms ease, border-color 140ms ease;
    }

    .item:hover {
      transform: translateY(-2px);
      border-color: rgba(0, 206, 209, 0.38);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .status {
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.72rem;
      padding: 0.23rem 0.5rem;
      border-radius: 999px;
      border: 1px solid transparent;
      position: relative;
    }

    .status.running {
      color: var(--ok);
      border-color: rgba(66, 214, 139, 0.45);
      animation: statusPulse 1.8s infinite;
    }

    .status.stopped,
    .status.created,
    .status.starting {
      color: var(--warn);
      border-color: rgba(245, 217, 123, 0.5);
    }

    @keyframes statusPulse {
      0% { box-shadow: 0 0 0 0 rgba(66, 214, 139, 0.4); }
      70% { box-shadow: 0 0 0 8px rgba(66, 214, 139, 0); }
      100% { box-shadow: 0 0 0 0 rgba(66, 214, 139, 0); }
    }

    .project-meter {
      margin: 0.65rem 0 0.55rem;
      border: 1px solid #2e3939;
      border-radius: 999px;
      overflow: hidden;
      background: #0f1212;
      height: 9px;
    }

    .project-meter > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #18aeb1, #00ced1);
      transition: width 240ms ease;
    }

    .link-state {
      margin: 0.45rem 0 0.45rem;
      border-radius: 8px;
      padding: 0.42rem 0.58rem;
      font-size: 0.79rem;
      border: 1px solid rgba(140, 152, 152, 0.4);
      background: rgba(17, 20, 20, 0.75);
      color: var(--muted);
    }

    .link-state.hosted {
      border-color: rgba(66, 214, 139, 0.5);
      color: #b6f2cd;
    }

    .link-state.local-only {
      border-color: rgba(245, 217, 123, 0.5);
      color: #f5df9e;
    }

    .link-state.offline {
      border-color: rgba(170, 178, 178, 0.35);
      color: #b7c0c0;
    }

    button,
    .button {
      background: linear-gradient(145deg, #143437, #132f31);
      color: var(--text);
      border: 1px solid rgba(0, 206, 209, 0.42);
      border-radius: 10px;
      padding: 0.5rem 0.78rem;
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease;
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover,
    .button:hover {
      transform: translateY(-1px);
      border-color: rgba(0, 206, 209, 0.8);
    }

    .button.commander {
      background: linear-gradient(145deg, #0c3f4d, #0a3340);
    }

    .button.logout {
      border-color: rgba(255, 107, 107, 0.58);
      background: linear-gradient(145deg, #3b1a1a, #311414);
    }

    button.danger {
      border-color: rgba(255, 107, 107, 0.5);
      background: linear-gradient(145deg, #3b1a1a, #331616);
    }

    button:disabled {
      opacity: 0.62;
      cursor: wait;
      transform: none;
    }

    input {
      width: 100%;
      background: #101212;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 0.66rem;
      margin-top: 0.35rem;
      transition: border-color 140ms ease, box-shadow 140ms ease;
    }

    input:focus {
      outline: none;
      border-color: rgba(0, 206, 209, 0.8);
      box-shadow: 0 0 0 2px rgba(0, 206, 209, 0.18);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.8rem;
      align-items: end;
    }

    .note,
    .error,
    .success {
      margin-top: 0.6rem;
      font-size: 0.9rem;
    }

    .error {
      color: var(--danger);
    }

    .success {
      color: var(--ok);
      animation: successPulse 520ms ease;
    }

    @keyframes successPulse {
      from { transform: translateY(4px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    footer {
      color: var(--muted);
      font-size: 0.84rem;
      margin: 1rem 0 0.4rem;
      text-align: right;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      padding-top: 0.65rem;
    }

    @media (max-width: 940px) {
      .workspaces,
      .projects,
      .vm,
      .password {
        grid-column: span 12;
      }

      nav {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <div class="brand">uwu <span>workspace</span></div>
      <div class="actions">
        <a class="button commander" href="/commander">Commander</a>
        <a class="button" href="/test-reports">Test Reports</a>
        <a class="button" href="/terminal/" target="_blank" rel="noreferrer">Connect to Terminal</a>
        <a class="button logout" href="/logout">Logout</a>
        <button id="newWorkspaceBtn" class="button" type="button">New Workspace</button>
      </div>
    </nav>

    <div id="topError" class="error"></div>

    <div class="grid">
      <section class="card vm">
        <h2>VM Details</h2>
        <div id="vmMetrics" class="metrics"></div>
      </section>

      <section class="card workspaces">
        <h2>Workspaces</h2>
        <div id="workspacesList" class="list"></div>
      </section>

      <section class="card projects">
        <h2>Running Projects</h2>
        <div id="projectsList" class="list"></div>
      </section>

      <section class="card password">
        <h2>Password Reset</h2>
        <form id="passwordForm">
          <div class="form-grid">
            <label>
              Username
              <input id="resetUser" name="user" required>
            </label>
            <label>
              New Password
              <input id="resetPassword" name="new_password" type="password" required>
            </label>
            <button id="resetSubmit" type="submit">Reset Password</button>
          </div>
        </form>
        <div id="passwordMessage" class="note"></div>
      </section>
    </div>

    <footer id="versionText">version: loading</footer>
  </div>

  <script>
    const state = {
      vm: null,
      workspaces: [],
      projects: [],
      version: "unknown",
    };

    const vmMetrics = document.getElementById("vmMetrics");
    const workspacesList = document.getElementById("workspacesList");
    const projectsList = document.getElementById("projectsList");
    const topError = document.getElementById("topError");
    const passwordForm = document.getElementById("passwordForm");
    const passwordMessage = document.getElementById("passwordMessage");
    const versionText = document.getElementById("versionText");
    function getNextWorkspaceName() {
      // derive next workspace name as workspace-N where N is max existing + 1
      let max = 0;
      if (state.workspaces && Array.isArray(state.workspaces)) {
        for (const ws of state.workspaces) {
          if (ws?.name) {
            const m = ws.name.match(/^workspace-(\d+)$/);
            if (m) {
              const n = parseInt(m[1], 10);
              if (Number.isFinite(n)) max = Math.max(max, n);
            }
          }
        }
      }
      return `workspace-${max + 1}`;
    }
    const newWorkspaceBtn = document.getElementById("newWorkspaceBtn");
    if (newWorkspaceBtn) {
      newWorkspaceBtn.addEventListener("click", async () => {
        const defaultName = getNextWorkspaceName();
        const input = window.prompt("Enter new workspace name", defaultName);
        if (input === null) return;
        const name = input ? input.trim() : "";
        if (!name) {
          setGlobalError("Workspace name cannot be empty");
          return;
        }
        newWorkspaceBtn.disabled = true;
        newWorkspaceBtn.textContent = "Creating...";
        try {
          await fetchJson("/api/workspaces", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name }),
          });
          // Refresh only the workspaces list to reflect the new entry
          const updatedWorkspaces = await fetchJson("/api/workspaces");
          state.workspaces = updatedWorkspaces;
          render();
          // Show success message
          topError.className = "success";
          topError.textContent = `Workspace "${name}" created.`;
        } catch (err) {
          setGlobalError(`Create workspace failed: ${err.message}`);
        } finally {
          newWorkspaceBtn.disabled = false;
          newWorkspaceBtn.textContent = "New Workspace";
        }
      });
    }

    function formatNumber(value, suffix) {
      if (value === null || value === undefined || Number.isNaN(value)) {
        return "-";
      }
      return `${value}${suffix}`;
    }

    function formatUptime(seconds) {
      if (!Number.isFinite(seconds)) {
        return "-";
      }
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      return `${days}d ${hours}h ${mins}m`;
    }

    function metric(label, value) {
      return `<div class="metric"><div class="label">${label}</div><div class="value">${value}</div></div>`;
    }

    function usagePercent(used, total) {
      if (!Number.isFinite(used) || !Number.isFinite(total) || total <= 0) {
        return null;
      }
      return (used / total) * 100;
    }

    function formatPercent(value) {
      if (!Number.isFinite(value)) {
        return "-";
      }
      return `${value.toFixed(1)}%`;
    }

    function setGlobalError(message) {
      topError.textContent = message || "";
    }

    function setGlobalSuccess(message) {
      topError.className = "success";
      topError.textContent = message || "";
    }

    function setGlobalNeutral() {
      topError.className = "error";
    }

    function renderProjectUrls(project) {
      const rows = [];

      const previews = Array.isArray(project.preview_urls) ? project.preview_urls : [];
      const hostedCount = previews.filter((preview) => Boolean(preview?.public_url)).length;
      const localCount = previews.filter((preview) => Boolean(preview?.local_url)).length;

      let stateBanner = "";
      if (project.status !== "running") {
        stateBanner = `<div class="link-state offline">Project is stopped. Start it before expecting hosted frontend links.</div>`;
      } else if (hostedCount > 0) {
        stateBanner = `<div class="link-state hosted">Hosted links active: ${hostedCount}/${Math.max(previews.length, hostedCount)} frontend port(s).</div>`;
      } else if (localCount > 0) {
        stateBanner = `<div class="link-state local-only">Local-only links detected. Click Publish Frontends to refresh hosted URLs.</div>`;
      } else {
        stateBanner = `<div class="link-state local-only">No frontend links yet. Start frontend services, then click Publish Frontends.</div>`;
      }

      for (const preview of previews) {
        if (preview?.public_url) {
          rows.push(`Hosted Frontend (${preview.local_port}): <a href="${preview.public_url}" target="_blank" rel="noreferrer">${preview.public_url}</a>`);
        } else if (preview?.local_url) {
          rows.push(`Local Frontend (${preview.local_port}): <a href="${preview.local_url}" target="_blank" rel="noreferrer">${preview.local_url}</a>`);
        }
      }

      if (!rows.length) {
        if (project.status === "running") {
          rows.push("No frontend URLs yet. Click Publish Frontends after your frontend(s) are running.");
        } else {
          rows.push("No frontend URLs yet. Start project, then Publish Frontends.");
        }
      }

      return `${stateBanner}${rows.map((row) => `<div class="label">${row}</div>`).join("")}`;
    }

    function statusPercent(status) {
      if (status === "running") {
        return 100;
      }
      if (status === "starting") {
        return 62;
      }
      if (status === "created") {
        return 24;
      }
      return 12;
    }

    async function fetchJson(url, options) {
      const res = await fetch(url, options);
      if (!res.ok) {
        let detail = "";
        try {
          const data = await res.json();
          detail = data.error || JSON.stringify(data);
        } catch (_) {
          detail = await res.text();
        }
        throw new Error(`${res.status} ${res.statusText}${detail ? `: ${detail}` : ""}`);
      }
      return res.json();
    }

    function render() {
      const vm = state.vm;
      const memoryPercent = vm ? usagePercent(vm.memory_used_mb, vm.memory_total_mb) : null;
      const diskPercent = vm ? usagePercent(vm.disk_used_gb, vm.disk_total_gb) : null;

      vmMetrics.innerHTML = vm
        ? [
            metric("Hostname", vm.hostname || "-"),
            metric("OS", vm.os || "-"),
            metric("CPU Cores", formatNumber(vm.cpu_cores, "")),
            metric("CPU Usage", formatPercent(vm.cpu_usage_percent)),
            metric("RAM Usage", `${formatNumber(vm.memory_used_mb, "")} / ${formatNumber(vm.memory_total_mb, "")} MB (${formatPercent(memoryPercent)})`),
            metric("Disk Usage", `${formatNumber(vm.disk_used_gb, "")} / ${formatNumber(vm.disk_total_gb, "")} GB (${formatPercent(diskPercent)})`),
            metric("Uptime", formatUptime(vm.uptime_seconds)),
          ].join("")
        : "<div class='label'>Loading VM details...</div>";

      if (!state.workspaces.length) {
        workspacesList.innerHTML = "<div class='label'>No workspaces available.</div>";
      } else {
        workspacesList.innerHTML = state.workspaces
          .map((ws) => `
            <div class="item">
              <div class="row"><strong>${ws.name}</strong><span class="status ${ws.status}">${ws.status}</span></div>
              <div class="label">${ws.path}</div>
              <div class="label">Size: ${ws.size_mb !== null && ws.size_mb !== undefined ? `${ws.size_mb} MB` : "unknown"}</div>
            </div>`)
          .join("");
      }

      if (!state.projects.length) {
        projectsList.innerHTML = "<div class='label'>No projects found.</div>";
      } else {
        projectsList.innerHTML = state.projects
          .map((p) => {
            return `
            <div class="item" data-id="${p.id}">
              <div class="row">
                <strong>${p.name}</strong>
                <span class="status ${p.status}">${p.status}</span>
              </div>
              <div class="project-meter"><span style="width:${statusPercent(p.status)}%"></span></div>
              <div class="label">${p.path}</div>
              ${renderProjectUrls(p)}
              <div class="actions" style="margin-top:0.65rem;">
                ${p.status === "running" ? "" : '<button data-action="start">Start</button>'}
                ${p.status === "running" ? '<button data-action="stop">Stop</button>' : ""}
                <button data-action="publish-frontends">Publish Frontends</button>
                <button data-action="tmux-test-log">TMUX Test Log</button>
                <button class="danger" data-action="delete">Delete</button>
              </div>
            </div>`;
          })
          .join("");
      }

      const runningCount = state.workspaces.filter((ws) => ws.status === "running").length;
      const uptime = state.vm ? formatUptime(state.vm.uptime_seconds) : "-";
      versionText.textContent = `version: ${state.version} | workspaces: ${state.workspaces.length} total / ${runningCount} running | daemon uptime: ${uptime}`;
    }

    async function loadDashboard() {
      try {
        setGlobalError("");
        const [vm, workspaces, projects, health] = await Promise.all([
          fetchJson("/api/vm"),
          fetchJson("/api/workspaces"),
          fetchJson("/api/projects"),
          fetchJson("/health"),
        ]);
        state.vm = vm;
        state.workspaces = workspaces;
        state.projects = projects;
        state.version = health.version || "unknown";
      } catch (err) {
        setGlobalError(`Failed loading dashboard: ${err.message}`);
      }
      render();
    }

    async function projectAction(id, action) {
      const selector = `.item[data-id="${id}"] button[data-action="${action}"]`;
      const button = projectsList.querySelector(selector);
      if (button) {
        button.disabled = true;
        button.textContent = "Working...";
      }

      try {
        setGlobalNeutral();
        if (action === "delete") {
          await fetchJson(`/api/projects/${id}`, { method: "DELETE" });
          await loadDashboard();
          setGlobalSuccess(`Project ${id} deleted.`);
          return;
        }

        if (action === "tmux-test-log") {
          const result = await fetchJson(`/api/projects/${id}/tmux-test-log`, { method: "POST" });
          await loadDashboard();
          const sessions = Array.isArray(result.sessions) ? result.sessions.join(", ") : "none";
          setGlobalSuccess(`tmux test log created: ${result.log_file} (sessions: ${sessions})`);
          return;
        }

        if (action === "publish-frontends") {
          const result = await fetchJson(`/api/projects/${id}/publish-frontends`, { method: "POST" });
          await loadDashboard();
          const published = Array.isArray(result.published_ports) ? result.published_ports.join(", ") : "";
          const skipped = Array.isArray(result.skipped_ports) ? result.skipped_ports.join(", ") : "";
          setGlobalSuccess(`frontend publish completed. published: ${published || "none"}; skipped: ${skipped || "none"}`);
          return;
        } else {
          await fetchJson(`/api/projects/${id}/${action}`, { method: "POST" });
          await loadDashboard();
          setGlobalSuccess(`Project ${id} ${action} completed.`);
          return;
        }
      } catch (err) {
        setGlobalNeutral();
        setGlobalError(`Project action failed: ${err.message}`);
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent =
            action === "tmux-test-log"
              ? "TMUX Test Log"
              : action === "publish-frontends"
                ? "Publish Frontends"
              : action.charAt(0).toUpperCase() + action.slice(1);
        }
      }
    }

    projectsList.addEventListener("click", (event) => {
      const btn = event.target.closest("button[data-action]");
      if (!btn) {
        return;
      }
      const card = event.target.closest(".item[data-id]");
      if (!card) {
        return;
      }
      const id = card.getAttribute("data-id");
      const action = btn.getAttribute("data-action");
      if (id && action) {
        projectAction(id, action);
      }
    });

    passwordForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const submit = document.getElementById("resetSubmit");
      const user = document.getElementById("resetUser").value.trim();
      const newPassword = document.getElementById("resetPassword").value;

      passwordMessage.className = "note";
      passwordMessage.textContent = "";

      submit.disabled = true;
      submit.textContent = "Resetting...";
      try {
        const payload = { user, new_password: newPassword };
        const result = await fetchJson("/api/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        passwordMessage.className = "success";
        passwordMessage.textContent = result.message || "Password updated.";
        passwordForm.reset();
      } catch (err) {
        passwordMessage.className = "error";
        passwordMessage.textContent = `Password reset failed: ${err.message}`;
      } finally {
        submit.disabled = false;
        submit.textContent = "Reset Password";
      }
    });

    loadDashboard();
    setInterval(loadDashboard, 10000);
  </script>
</body>
</html>
